# Dokploy Phase 1 stack — nginx gateway + Dokploy Traefik TLS.
#
# Traffic: Traefik (HTTPS) → nginx:80 → django:5000 | frontend:80
# Compose file: backend/docker-compose.dokploy.yml
# Build env: VITE_PUBLIC_APP_ORIGIN=https://morph.origin4.co
# Secrets: paste .envs/.production/dokploy.env.example into Dokploy Environment
#   (saved as backend/.env on the server — not committed)
#
# Domains: attach ONLY to nginx service (port 80), OR use Traefik labels below.
# django + frontend are internal (no Traefik labels).
#
# Network: nginx joins dokploy-network so Traefik can reach it.

volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}

networks:
  dokploy-network:
    external: true

services:
  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: kotak_production_django
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    command: /start
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/csrf/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - default

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_APP_ORIGIN: ${VITE_PUBLIC_APP_ORIGIN:-https://morph.origin4.co}
    image: kotak_production_frontend
    depends_on:
      - django
    restart: unless-stopped
    networks:
      - default

  nginx:
    build:
      context: .
      dockerfile: ./compose/production/nginx/Dockerfile
    image: kotak_production_nginx
    depends_on:
      - django
      - frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.kotak-web.rule=Host(`morph.origin4.co`) || Host(`www.morph.origin4.co`)
      - traefik.http.routers.kotak-web.entrypoints=websecure
      - traefik.http.routers.kotak-web.tls.certResolver=letsencrypt
      - traefik.http.routers.kotak-web.service=kotak-web
      - traefik.http.services.kotak-web.loadbalancer.server.port=80

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: kotak_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
      - production_postgres_data_backups:/backups
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default

  redis:
    image: docker.io/redis:7.2
    restart: unless-stopped
    networks:
      - default

  awscli:
    build:
      context: .
      dockerfile: ./compose/production/aws/Dockerfile
    env_file:
      - .env
    volumes:
      - production_postgres_data_backups:/backups:z
    networks:
      - default
