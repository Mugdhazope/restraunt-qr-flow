# Replace YOUR_DOMAIN (and ACME email) before deploy, or let Dokploy manage
# Traefik and omit this bundled Traefik service (see docs/DEPLOY_AWS_DOKPLOY.md).
log:
  level: INFO

entryPoints:
  web:
    # http
    address: ':80'
    http:
      # https://doc.traefik.io/traefik/routing/entrypoints/#entrypoint
      redirections:
        entryPoint:
          to: web-secure

  web-secure:
    # https
    address: ':443'

certificatesResolvers:
  letsencrypt:
    # https://doc.traefik.io/traefik/https/acme/#lets-encrypt
    acme:
      email: 'ops@YOUR_DOMAIN'
      storage: /etc/traefik/acme/acme.json
      # https://doc.traefik.io/traefik/https/acme/#httpchallenge
      httpChallenge:
        entryPoint: web

http:
  routers:
    # API / admin / auth / Django static → gunicorn
    web-secure-django:
      rule: >-
        (Host(`YOUR_DOMAIN`) || Host(`www.YOUR_DOMAIN`)) &&
        (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/accounts`) ||
         PathPrefix(`/static`) || PathPrefix(`/media`))
      entryPoints:
        - web-secure
      middlewares:
        - csrf
      service: django
      tls:
        certResolver: letsencrypt
      priority: 100

    # SPA (everything else on the same host)
    web-secure-frontend:
      rule: 'Host(`YOUR_DOMAIN`) || Host(`www.YOUR_DOMAIN`)'
      entryPoints:
        - web-secure
      service: frontend
      tls:
        certResolver: letsencrypt
      priority: 1

  middlewares:
    csrf:
      # https://doc.traefik.io/traefik/master/middlewares/http/headers/#hostsproxyheaders
      # https://docs.djangoproject.com/en/dev/ref/csrf/#ajax
      headers:
        hostsProxyHeaders: ['X-CSRFToken']

  services:
    django:
      loadBalancer:
        servers:
          - url: http://django:5000
    frontend:
      loadBalancer:
        servers:
          - url: http://frontend:80

providers:
  # https://doc.traefik.io/traefik/master/providers/file/
  file:
    filename: /etc/traefik/traefik.yml
    watch: true
