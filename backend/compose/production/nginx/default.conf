# Gateway for morph.origin4.co — Dokploy Traefik → nginx → django/frontend.
# Media served from S3/CloudFront (absolute URLs); no /media proxy here.

resolver 127.0.0.11 valid=10s ipv6=off;

map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 25m;

  # Django API
  location /api/ {
    set $django_upstream django:5000;
    proxy_pass http://$django_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;
    proxy_buffering off;
  }

  # Django allauth
  location /accounts/ {
    set $django_upstream django:5000;
    proxy_pass http://$django_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;
    proxy_buffering off;
  }

  # Django users URLs
  location /users/ {
    set $django_upstream django:5000;
    proxy_pass http://$django_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;
    proxy_buffering off;
  }

  # WhiteNoise static (admin CSS/JS etc.)
  location /static/ {
    set $django_upstream django:5000;
    proxy_pass http://$django_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;
    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;
  }

  # Django admin — must match DJANGO_ADMIN_URL=manage/
  location /manage/ {
    set $django_upstream django:5000;
    proxy_pass http://$django_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;
    proxy_buffering off;
  }

  # SPA (frontend nginx handles try_files)
  location / {
    set $frontend_upstream frontend:80;
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_redirect off;
  }
}
